<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Butler">
<meta name="theme-color" content="#08080f">
<title>Butler Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080f;--bg2:#111119;--bg3:#1a1a26;--bg4:#22222e;
  --border:#ffffff0f;--border2:#ffffff18;--border3:#ffffff24;
  --text:#f0ede8;--text2:#8a8898;--text3:#4a4a5e;
  --gold:#c9a84c;--gold2:#e8c97a;
  --green:#4ade80;--yellow:#facc15;--orange:#fb923c;--red:#f87171;
  --blue:#818cf8;--pink:#e879a0;--teal:#2dd4bf;--purple:#c084fc;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available}

.hdr{padding:50px 16px 10px;background:linear-gradient(180deg,#0d0d18 0%,var(--bg) 100%);border-bottom:1px solid var(--border);flex-shrink:0}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start}
.hdr-title{font-family:'DM Serif Display',serif;font-size:24px;color:var(--gold2)}
.hdr-date{font-size:9px;color:var(--text3);margin-top:3px;letter-spacing:1.5px;text-transform:uppercase}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.active-pill{background:#ef444420;color:var(--red);font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid #ef444430}
.sync-dot{font-size:9px;color:var(--teal);letter-spacing:.5px}
.sync-dot.off{color:var(--text3)}

.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:11px 10px;background:transparent;border:none;color:var(--text3);font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.3px;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:4px;white-space:nowrap}
.tab.active{color:var(--text);border-bottom-color:var(--gold)}
.tbadge{background:var(--bg3);color:var(--text3);font-size:9px;padding:1px 5px;border-radius:9px}
.tab.active .tbadge{background:#c9a84c20;color:var(--gold)}

.main{flex:1;overflow-y:auto;padding:13px 13px 90px;-webkit-overflow-scrolling:touch}

.sec-lbl{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;font-weight:500}
.empty{text-align:center;color:var(--text3);padding:32px 16px;font-size:12px;letter-spacing:.5px}
.add-btn{width:100%;background:var(--bg3);border:1px dashed var(--border3);border-radius:10px;padding:10px;color:var(--gold);font-size:12px;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.3px;margin-bottom:10px}

.chip-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:11px;margin-bottom:10px}
.chip-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.g-chip{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:7px 3px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'DM Mono',monospace}
.g-chip:active{background:#818cf820;border-color:var(--blue)}
.chip-room{font-size:11px;font-weight:500;color:var(--blue)}
.chip-name{font-size:8px;color:var(--text2)}

.rcard{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:12px 13px;margin-bottom:7px}
.rcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.rcard-left{display:flex;align-items:center;gap:9px}
.ricon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.rtype{font-size:12px;font-weight:500;color:var(--text)}
.rguest{font-size:10px;color:var(--text2);margin-top:1px}
.rtimer{font-size:21px;font-weight:500;font-family:'DM Serif Display',serif;text-align:right;line-height:1}
.tbar{height:3px;border-radius:2px;margin-top:4px;width:50px;background:#ffffff08;overflow:hidden}
.tfill{height:100%;border-radius:2px;transition:width 1s linear}
.rnote{font-size:11px;color:var(--text2);background:var(--bg);padding:6px 8px;border-radius:6px;margin:5px 0;line-height:1.4}
.ractions{display:flex;align-items:center;gap:5px;margin-top:4px}
.rtime{font-size:10px;color:var(--text3);flex:1}
.btn-res{background:#16a34a20;color:var(--green);font-size:11px;padding:5px 11px;border-radius:6px;border:1px solid #16a34a30;cursor:pointer;font-family:'DM Mono',monospace;font-weight:500}
.btn-del{background:transparent;border:none;cursor:pointer;font-size:13px;color:var(--text3);padding:3px}
.resolved-card{opacity:.4}

.grow{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 11px;display:flex;align-items:center;gap:7px;margin-bottom:7px}
.ginfo{flex:1;cursor:pointer}
.groom{font-size:10px;color:var(--blue);font-weight:500;letter-spacing:.5px}
.gname{font-size:12px;color:var(--text);margin-top:1px}
.gmeta{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap}
.gtag{font-size:9px;color:var(--red)}
.gnotetag{font-size:10px}
.gboattag{font-size:9px;color:var(--teal)}
.gacts{display:flex;gap:1px}
.ibtn{background:transparent;border:none;cursor:pointer;font-size:15px;padding:4px;color:var(--text2)}

.drow{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.dleft{flex:1}
.droom{font-size:9px;color:var(--text3)}
.dname{font-size:12px;color:var(--text)}
.dnote{font-size:10px;color:var(--text2);margin-top:2px}
.dright{text-align:right}
.drest{font-size:12px;color:var(--pink);font-weight:500}
.dtime{font-size:9px;color:var(--text3);margin-top:2px}

.day-block{background:var(--bg2);border:1px solid var(--border);border-radius:11px;margin-bottom:10px;overflow:hidden}
.day-hdr{padding:9px 13px;background:var(--bg3);display:flex;justify-content:space-between;align-items:center}
.day-name{font-size:12px;font-weight:500;color:var(--gold2)}
.day-count{font-size:10px;color:var(--text3)}
.agenda-item{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:9px;cursor:pointer}
.agenda-item:last-child{border-bottom:none}
.ag-time{font-size:11px;color:var(--gold);min-width:42px;font-weight:500}
.ag-body{flex:1}
.ag-type{font-size:11px;color:var(--text);font-weight:500}
.ag-guest{font-size:10px;color:var(--text2);margin-top:1px}
.ag-note{font-size:10px;color:var(--text3);margin-top:2px}
.ag-dot{width:8px;height:8px;border-radius:50%;margin-top:3px;flex-shrink:0}

.overlay{position:fixed;inset:0;background:#00000088;display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(3px);animation:fi .15s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-top-left-radius:20px;border-top-right-radius:20px;width:100%;max-width:600px;padding:18px 17px 38px;max-height:90vh;overflow-y:auto;animation:su .2s ease}
@keyframes su{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhandle{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.mtitle{font-family:'DM Serif Display',serif;font-size:19px;color:var(--gold2);margin-bottom:3px}
.msub{font-size:10px;color:var(--blue);margin-bottom:14px;letter-spacing:.5px}
.mlbl{font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin:11px 0 4px;font-weight:500}
.minput{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:9px 11px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;outline:none}
.minput:focus{border-color:var(--gold)}
.mta{resize:vertical;min-height:65px}
.msel{appearance:none;-webkit-appearance:none;cursor:pointer}
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin:3px 0}
.tbtn{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:8px 3px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'DM Mono',monospace;color:var(--text2);font-size:9px;transition:all .15s}
.tbtn.sel{color:var(--gold);border-color:var(--gold);background:#c9a84c10}
.tbtn:active{transform:scale(.95)}
.ticon{font-size:18px}
.mbtns{display:flex;gap:7px;margin-top:16px;justify-content:flex-end}
.mbpri{background:linear-gradient(135deg,var(--gold),#b8892a);color:#08080f;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;font-weight:500}
.mbsec{background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px}
.btn-danger{background:#ef444420;color:var(--red);border:1px solid #ef444430;border-radius:8px;padding:10px 16px;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;flex:1}
.note-box{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:11px;color:var(--text2);line-height:1.5;margin:5px 0}
.hist-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border);gap:8px}
.hist-type{font-size:11px;color:var(--text)}
.hist-meta{font-size:9px;color:var(--text3);margin-top:2px}
.hist-time{font-size:10px;color:var(--text3);text-align:right;flex-shrink:0}
.alarm-tag{font-size:9px;color:var(--purple);background:#c084fc18;border:1px solid #c084fc30;padding:1px 6px;border-radius:10px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;font-size:11px;padding:8px 18px;border-radius:22px;z-index:200;font-weight:500;box-shadow:0 4px 18px #00000066;white-space:nowrap;animation:ti .2s ease}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text2)}
.loading-icon{font-size:40px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>

const fmtName  = n=>{ if(!n)return""; const p=n.split(",").map(s=>s.trim()); return p.length===2?`${p[1]} ${p[0]}`:n; };
const firstName= n=>fmtName(n).split(" ")[0];
const gById    = id=>guests[id];
const rTypeOf  = id=>REQ_TYPES.find(t=>t.id===id)||REQ_TYPES[REQ_TYPES.length-1];

const rList    = ()=>Object.values(requests).sort((a,b)=>b.createdAt-a.createdAt);
const dList    = ()=>Object.values(dinners).sort((a,b)=>(b.date||"").localeCompare(a.date||""));

function fmtElapsed(ms){
  const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);
  if(h>0)return`${h}h ${m%60}m`; if(m>0)return`${m}m`; return`${s}s`;
}
function timerColor(ms){
  const m=ms/60000;
  if(m<15)return"#4ade80"; if(m<30)return"#facc15"; if(m<60)return"#fb923c"; return"#f87171";
}
function fmtClock(ts){ return new Date(ts).toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"}); }
function fmtFull(ts){ return new Date(ts).toLocaleDateString("es-MX",{weekday:"short",day:"2-digit",month:"short"})+` ${fmtClock(ts)}`; }
function fmtDateLabel(ds){
  if(!ds)return"";
  const d=new Date(ds+"T12:00:00");
  return`${DAYS_ES[d.getDay()].slice(0,3)} ${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}`;
}

async function seedIfEmpty(){
  const snap = await new Promise(res=>onValue(ref(db,"guests"),res,{onlyOnce:true}));
  if(!snap.val()){

    SEED.forEach(g=>{ const k=push(ref(db,"guests")).key; batch[k]={...g,note:"",boat_in:"",boat_out:"",id:k}; });

  }
}

  else h+=`<div class="sec-lbl">Activas (${active.length})</div>`+active.map(r=>rcardHTML(r,false)).join("");

  main.innerHTML=h;

function rcardHTML(req,resolved){
  const rt=rTypeOf(req.type);
  const g=gById(req.guestId);
  const elapsed=Date.now()-req.createdAt;
  const duration=req.resolvedAt?req.resolvedAt-req.createdAt:elapsed;
  const col=resolved?"#3a3a4a":timerColor(elapsed);
  const pct=Math.min(100,(duration/3600000)*100);
  const showTimer=rt.timer&&!resolved;
  const showTimerResolved=rt.timer&&resolved;

  let extras="";
  if(req.note)        extras+=`<div class="rnote">${req.note}</div>`;
  if(req.restaurant)  extras+=`<div class="rnote">🕯️ ${req.restaurant} ${req.dinner_time||""} ${req.dinner_date?`· ${fmtDateLabel(req.dinner_date)}`:""}</div>`;
  if(req.boat_type)   extras+=`<div class="rnote">⛵ ${req.boat_type==="out"?"Salida":"Llegada"} ${req.boat_time||""} ${req.boat_date?`· ${fmtDateLabel(req.boat_date)}`:""}</div>`;
  if(req.golf_date)   extras+=`<div class="rnote">⛳ ${fmtDateLabel(req.golf_date)} ${req.golf_time||""}</div>`;
  if(req.alarm_dt)    extras+=`<div class="rnote"><span class="alarm-tag">⏰ ${new Date(req.alarm_dt).toLocaleDateString("es-MX",{day:"2-digit",month:"short"})} ${req.alarm_time||""}</span></div>`;
  if(req.other_type)  extras+=`<div class="rnote">📋 ${req.other_type}</div>`;

  const timerBlock=showTimer
    ?`<div><div class="rtimer" style="color:${col}">${fmtElapsed(duration)}</div><div class="tbar"><div class="tfill" style="background:${col};width:${pct}%"></div></div></div>`
    :(showTimerResolved?`<div style="font-size:11px;color:var(--text3);text-align:right">⏱ ${fmtElapsed(duration)}</div>`:"");

  return `<div class="rcard ${resolved?"resolved-card":""}">
    <div class="rcard-top">
      <div class="rcard-left">
        <div class="ricon" style="background:${rt.color}18;color:${rt.color}">${rt.icon}</div>
        <div><div class="rtype">${rt.label}</div>${g?`<div class="rguest">Hab. ${g.room} · ${firstName(g.name)}</div>`:""}</div>
      </div>
      ${timerBlock}
    </div>
    ${extras}
    <div class="ractions">
      <span class="rtime">${fmtClock(req.createdAt)}</span>
      ${!resolved?`<button class="btn-res" onclick="resolveReq('${req.id}')">✓ Resolver</button>`:""}
      <button class="btn-del" onclick="delReq('${req.id}')">🗑</button>
    </div>
  </div>`;
}

// ═══ TIMELINE ═════════════════════════════════════════════
function renderTimeline(){
  const main=document.getElementById("main"); if(!main)return;
  const gl=gList().filter(g=>g.checkin&&g.checkout);
  const noDate=gList().filter(g=>!g.checkin||!g.checkout);

  if(gl.length===0){
    main.innerHTML=`<div class="empty">Sin huéspedes con fechas de check-in/check-out.<br><br>Edita los huéspedes y agrega sus fechas.</div>`;
    return;
  }

  // Calculate date range: from earliest checkin to latest checkout
  const today = new Date(); today.setHours(0,0,0,0);
  const dates = gl.flatMap(g=>[new Date(g.checkin+"T12:00:00"), new Date(g.checkout+"T12:00:00")]);
  let minD = new Date(Math.min(...dates)); minD.setHours(0,0,0,0);
  let maxD = new Date(Math.max(...dates)); maxD.setHours(0,0,0,0);

  // Show at least 14 days, centered around today
  const diffDays = Math.round((maxD-minD)/86400000)+1;
  const totalDays = Math.max(diffDays, 14);
  // Start from minD or 2 days before today, whichever is earlier
  const startD = new Date(Math.min(minD, new Date(today.getTime()-2*86400000)));
  startD.setHours(0,0,0,0);
  const endD = new Date(startD.getTime() + totalDays*86400000);

  // Build day headers
  const dayCount = Math.round((endD-startD)/86400000)+1;
  const dayLabels=[], dayDates=[];
  for(let i=0;i<dayCount;i++){
    const d=new Date(startD.getTime()+i*86400000);
    dayDates.push(d);
    const dd=d.getDate(), mo=MONTHS_SHORT[d.getMonth()];
    const dy=DAYS_ES[d.getDay()].slice(0,3);
    dayLabels.push({dd,mo,dy,isToday:d.toDateString()===today.toDateString()});
  }

  const CELL=36; // px per day
  const LEFT=90; // px for name column

  // Type color map
  const typeColors={
    VP1:"#c8c840",VP2:"#d4af37",VP3:"#ffd700",EPV:"#ffd700",
    CUM:"#e879a0",ANI:"#c084fc",LUN:"#60a5fa",UVD:"#4ade80",
    NOR:"#818cf8",EXP:"#94a3b8",default:"#818cf8"
  };

  let h=`<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:12px">
  <div style="min-width:${LEFT+dayCount*CELL}px">`;

  // Header row
  h+=`<div style="display:flex;position:sticky;top:0;z-index:10;background:var(--bg)">
    <div style="width:${LEFT}px;flex-shrink:0;padding:4px 6px;font-size:9px;color:var(--text3);border-bottom:1px solid var(--border)">HAB</div>`;
  dayLabels.forEach(d=>{
    h+=`<div style="width:${CELL}px;flex-shrink:0;text-align:center;padding:2px 0;border-bottom:1px solid var(--border);${d.isToday?`background:#c9a84c18;`:""}" >
      <div style="font-size:8px;color:${d.isToday?"var(--gold)":"var(--text3)"};">${d.dy}</div>
      <div style="font-size:10px;font-weight:${d.isToday?"700":"400"};color:${d.isToday?"var(--gold2)":"var(--text2)"};">${d.dd}</div>
      <div style="font-size:7px;color:var(--text3)">${d.mo}</div>
    </div>`;
  });
  h+=`</div>`;

  // Guest rows
  gl.sort((a,b)=>a.checkin.localeCompare(b.checkin)).forEach(g=>{
    const cin  = new Date(g.checkin+"T12:00:00");  cin.setHours(0,0,0,0);
    const cout = new Date(g.checkout+"T12:00:00"); cout.setHours(0,0,0,0);
    const color = typeColors[g.gtype]||typeColors.default;
    const pend  = rList().filter(r=>r.guestId===g.id&&!r.resolvedAt).length;

    // Calculate bar position
    const startOffset = Math.max(0, Math.round((cin-startD)/86400000));
    const endOffset   = Math.min(dayCount-1, Math.round((cout-startD)/86400000));
    const barWidth    = Math.max(1,(endOffset-startOffset+1))*CELL;
    const barLeft     = startOffset*CELL;

    // Days left
    const daysLeft = Math.round((cout-today)/86400000);
    const isCheckedOut = daysLeft < 0;
    const isToday = daysLeft === 0;

    h+=`<div style="display:flex;align-items:center;border-bottom:1px solid var(--border);min-height:38px;cursor:pointer" onclick="openGuestDetail('${g.id}')">
      <div style="width:${LEFT}px;flex-shrink:0;padding:4px 6px;">
        <div style="font-size:10px;font-weight:600;color:var(--blue)">${g.room}</div>
        <div style="font-size:8px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:${LEFT-8}px">${firstName(g.name)}</div>
        ${pend>0?`<div style="font-size:7px;color:var(--red)">●${pend}</div>`:""}
      </div>
      <div style="position:relative;flex:1;height:30px;">
        <div style="position:absolute;left:${barLeft}px;width:${barWidth}px;height:24px;top:3px;
          background:${isCheckedOut?"#374151":color+"33"};
          border:1px solid ${isCheckedOut?"#4b5563":color};
          border-radius:6px;display:flex;align-items:center;padding:0 6px;overflow:hidden;
          ${isToday?"box-shadow:0 0 0 2px "+color+";":""}">
          <span style="font-size:9px;color:${isCheckedOut?"#6b7280":color};font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
            ${isCheckedOut?"✓ OUT":isToday?"🔴 HOY":`${daysLeft}d`}
            ${g.gtype&&g.gtype!=="NOR"?` · ${g.gtype}`:""}
            ${g.celebration?` · ${g.celebration.split(" ")[0]}`:""}
          </span>
        </div>
        ${/* today line */ ""}
        ${(()=>{ const tp=Math.round((today-startD)/86400000); return tp>=0&&tp<dayCount?`<div style="position:absolute;left:${tp*CELL+CELL/2}px;top:0;width:1px;height:100%;background:var(--gold);opacity:.4"></div>`:""; })()}
      </div>
    </div>`;

  h+=`</div></div>`;

  // No-date guests
  if(noDate.length>0){
    h+=`<div class="sec-lbl" style="margin-top:14px">Sin fechas asignadas (${noDate.length})</div>`;
    h+=noDate.map(g=>`<div class="grow" onclick="openEditGuest('${g.id}')">

      <div style="font-size:9px;color:var(--orange)">⚠️ Sin check-in/out · toca para editar</div></div>
    </div>`).join("");
  }

  // Legend
  h+=`<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;padding:10px 0;border-top:1px solid var(--border)">
    <div style="font-size:9px;color:var(--text3);width:100%;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px">Leyenda</div>
    <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;border-radius:3px;background:#d4af3733;border:1px solid #d4af37"></div><span style="font-size:9px;color:var(--text2)">VIP</span></div>
    <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;border-radius:3px;background:#e879a033;border:1px solid #e879a0"></div><span style="font-size:9px;color:var(--text2)">Celebración</span></div>
    <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;border-radius:3px;background:#818cf833;border:1px solid #818cf8"></div><span style="font-size:9px;color:var(--text2)">Normal</span></div>
    <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:4px;background:var(--gold);opacity:.5;border-radius:1px"></div><span style="font-size:9px;color:var(--text2)">Hoy</span></div>
  </div>`;

  main.innerHTML=h;
}


  const main=document.getElementById("main"); if(!main)return;
  const gl=gList();
  let h=`<button class="add-btn" onclick="openAddGuest()">+ Agregar huésped</button>`;
  h+=gl.map(g=>{
    const pend=rList().filter(r=>r.guestId===g.id&&!r.resolvedAt).length;
    return `<div class="grow">
      <div class="ginfo" onclick="openGuestDetail('${g.id}')">
        <div class="groom">${g.room}</div>

        <div class="gmeta">
          ${pend>0?`<span class="gtag">● ${pend} pend.</span>`:""}
          ${g.note?`<span class="gnotetag">📝</span>`:""}
          ${g.boat_out?`<span class="gboattag">⛵↑${g.boat_out}</span>`:""}
          ${g.boat_in?`<span class="gboattag">⛵↓${g.boat_in}</span>`:""}

  main.innerHTML=h;

window.openGuestDetail = gid=>{
  const g=gById(gid); if(!g)return;
  const gReqs=rList().filter(r=>r.guestId===gid);
  const active=gReqs.filter(r=>!r.resolvedAt);
  const hist=gReqs.filter(r=>r.resolvedAt).slice(0,10);
  const gDins=dList().filter(d=>d.guestId===gid);
  const gGolf=gReqs.filter(r=>r.type==="golfcart");
  const gBoats=gReqs.filter(r=>r.type==="boat");
  const gFollowups=gReqs.filter(r=>r.type==="followup");
  const gDecs=gReqs.filter(r=>r.type==="decoration");

  let body=`<div class="mhandle"></div>
    <div class="mtitle">Hab. ${g.room}</div>
    <div class="msub">${fmtName(g.name)}</div>`;

  // Info row
  const infoItems = [
    g.checkin  ? `📅 In: ${fmtDateLabel(g.checkin)}`   : "",
    g.checkout ? `📅 Out: ${fmtDateLabel(g.checkout)}` : "",
    g.gtype    ? `🏷 ${g.gtype}`                        : "",
    g.celebration ? `${g.celebration}`                 : "",
    g.allergy  ? `⚠️ ${g.allergy}`                     : "",
    g.agency   ? `🏢 ${g.agency}`                      : "",
  ].filter(Boolean);
  if(infoItems.length>0) body+=`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">${infoItems.map(i=>`<span style="font-size:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:3px 8px;color:var(--text2)">${i}</span>`).join("")}</div>`;

  if(g.note) body+=`<div class="note-box">${g.note}</div>`;

  if(g.boat_out||g.boat_in||gBoats.length>0){
    body+=`<div class="mlbl">⛵ Barco</div>`;
    if(g.boat_out) body+=`<div class="note-box">↑ Salida: ${g.boat_out}</div>`;
    if(g.boat_in)  body+=`<div class="note-box">↓ Llegada: ${g.boat_in}</div>`;
    gBoats.forEach(r=>{ body+=`<div class="note-box">${r.boat_type==="out"?"↑ Salida":"↓ Llegada"} ${r.boat_time||""} ${r.boat_date?`· ${fmtDateLabel(r.boat_date)}`:""} ${r.note?`<br>${r.note}`:""}</div>`; });
  }

  if(active.length>0){
    body+=`<div class="mlbl">Solicitudes activas (${active.length})</div>`;
    body+=active.map(r=>rcardHTML(r,false)).join("");
  }

  if(gDins.length>0){
    body+=`<div class="mlbl">Cenas registradas</div>`;
    body+=gDins.map(d=>`<div class="hist-row">
      <div><div class="hist-type">🕯️ ${d.restaurant}</div>
      <div class="hist-meta">${d.date?fmtDateLabel(d.date):""} ${d.time||""}</div>
      ${d.note?`<div class="hist-meta">${d.note}</div>`:""}</div>
      <div class="hist-time">${fmtClock(d.createdAt)}</div></div>`).join("");
  }

  if(gGolf.length>0){
    body+=`<div class="mlbl">⛳ Golf Cart</div>`;
    body+=gGolf.map(r=>`<div class="note-box">${r.golf_date?fmtDateLabel(r.golf_date):""} ${r.golf_time||""} ${r.note?`<br>${r.note}`:""}</div>`).join("");
  }

  if(gDecs.length>0){
    body+=`<div class="mlbl">🎉 Decoraciones</div>`;
    body+=gDecs.map(r=>`<div class="note-box">${r.dec_date?fmtDateLabel(r.dec_date):""} ${r.dec_time||""} ${r.alarm_dt?`<br><span class="alarm-tag">⏰ ${new Date(r.alarm_dt).toLocaleDateString("es-MX",{day:"2-digit",month:"short"})} ${r.alarm_time}</span>`:""} ${r.note?`<br>${r.note}`:""}</div>`).join("");
  }

  if(gFollowups.length>0){
    body+=`<div class="mlbl">📌 Seguimientos</div>`;
    body+=gFollowups.map(r=>`<div class="note-box">${r.note||"—"}<br><span style="font-size:9px;color:var(--text3)">${fmtFull(r.createdAt)}</span></div>`).join("");
  }

  if(hist.length>0){
    body+=`<div class="mlbl">Historial</div>`;
    body+=hist.map(r=>{
      const rt=rTypeOf(r.type);
      const dur=r.resolvedAt-r.createdAt;
      return `<div class="hist-row">
        <div>
          <div class="hist-type">${rt.icon} ${rt.label}</div>
          <div class="hist-meta">${fmtFull(r.createdAt)} ${r.note?`· ${r.note}`:""}</div>
          ${rt.timer?`<div class="hist-meta" style="color:var(--teal)">⏱ Atendido en ${fmtElapsed(dur)}</div>`:""}
        </div>
        <div class="hist-time">${fmtClock(r.resolvedAt)}</div>
      </div>`;
    }).join("");
  }

  body+=`<div class="mbtns"><button class="mbsec" onclick="closeModal()">Cerrar</button><button class="mbpri" onclick="closeModal();openNewReq('${gid}')">➕ Solicitud</button></div>`;
  showModal(body);
};

const CELEBRATION_TYPES = ["","Luna de Miel 🌙","Cumpleaños 🎂","Aniversario 💍","Baby Moon 🍼","Otro 🎊"];
const GUEST_TYPES = ["","NOR","VP1","VP2","VP3","EPV","UVD","CUM","ANI","LUN","EXP"];

function guestFormHTML(g){
  const v = k => g?.[k]||"";
  const selCel = CELEBRATION_TYPES.map(t=>`<option ${v("celebration")===t?"selected":""}>${t}</option>`).join("");
  const selType = GUEST_TYPES.map(t=>`<option ${v("gtype")===t?"selected":""}>${t}</option>`).join("");
  return `
    <div class="mlbl">Habitación *</div>
    <input class="minput" id="groot" inputmode="numeric" placeholder="1234" value="${v("room")}">
    <div class="mlbl">Nombre (APELLIDO, NOMBRE) *</div>
    <input class="minput" id="gnoot" placeholder="SMITH, JOHN" style="text-transform:uppercase" value="${v("name")}">
    <div class="row2">
      <div><div class="mlbl">Check-in</div><input type="date" class="minput" id="gcheckin" value="${v("checkin")}"></div>
      <div><div class="mlbl">Check-out</div><input type="date" class="minput" id="gcheckout" value="${v("checkout")}"></div>
    </div>
    <div class="mlbl">Tipo</div>
    <select class="minput msel" id="gtype"><option value="">Sin tipo</option>${selType}</select>
    <div class="mlbl">Celebración</div>
    <select class="minput msel" id="gcelebration"><option value="">Ninguna</option>${selCel}</select>
    <div class="mlbl">Alergia</div>
    <input class="minput" id="gallergy" placeholder="Ej: mariscos, nueces..." value="${v("allergy")}">
    <div class="mlbl">Agencia</div>
    <input class="minput" id="gagency" placeholder="Ej: AMEX, Expedia..." value="${v("agency")}">`;
}

window.openAddGuest = ()=>{
  showModal(`<div class="mhandle"></div><div class="mtitle">Agregar huésped</div>
    ${guestFormHTML(null)}
    <div class="mbtns"><button class="mbsec" onclick="closeModal()">Cancelar</button><button class="mbpri" onclick="saveGuest(null)">Agregar</button></div>`);
};

window.openEditGuest = gid=>{
  const g=gById(gid);
  showModal(`<div class="mhandle"></div><div class="mtitle">Editar huésped</div>
    ${guestFormHTML(g)}
    <div class="mbtns"><button class="mbsec" onclick="closeModal()">Cancelar</button><button class="mbpri" onclick="saveGuest('${gid}')">Guardar</button></div>`);

window.saveGuest = gid=>{
  const room=document.getElementById("groot")?.value?.trim();
  const name=document.getElementById("gnoot")?.value?.trim()?.toUpperCase();
  if(!room||!name){showToast("Completa los campos","#dc2626");return;}
  const data={
    room, name,
    checkin:   document.getElementById("gcheckin")?.value||"",
    checkout:  document.getElementById("gcheckout")?.value||"",
    gtype:     document.getElementById("gtype")?.value||"",
    celebration:document.getElementById("gcelebration")?.value||"",
    allergy:   document.getElementById("gallergy")?.value||"",
    agency:    document.getElementById("gagency")?.value||"",
  };
  if(gid){ update(ref(db,`guests/${gid}`),data); }
  else{ const k=push(ref(db,"guests")).key; set(ref(db,`guests/${k}`),{id:k,note:"",boat_in:"",boat_out:"",...data}); }
  closeModal(); showToast("Guardado ✓");
};

window.confirmDel = gid=>{
  const g=gById(gid);
  showModal(`<div class="mhandle"></div><div class="mtitle">Eliminar huésped</div>
    <div class="msub">Hab. ${g.room} · ${fmtName(g.name)}</div>

window.delGuest = gid=>{

  });

// ═══ AGENDA ═══════════════════════════════════════════════
function getAgendaItems(){
  const items=[];
  const today=new Date(); today.setHours(0,0,0,0);
  rList().forEach(req=>{
    let date=null,time="",label="",icon="",color="";
    if(req.type==="dinner"&&req.dinner_date){date=req.dinner_date;time=req.dinner_time||"";label=`Cena · ${req.restaurant||""}`;icon="🕯️";color="#e879a0";}
    if(req.type==="golfcart"&&req.golf_date){date=req.golf_date;time=req.golf_time||"";label="Golf Cart";icon="⛳";color="#4ade80";}
    if(req.type==="boat"&&req.boat_date){date=req.boat_date;time=req.boat_time||"";label=`Barco ${req.boat_type==="out"?"↑ Salida":"↓ Llegada"}`;icon="⛵";color="#60a5fa";}
    if(req.type==="decoration"&&req.dec_date){date=req.dec_date;time=req.dec_time||"";label="Decoración";icon="🎉";color="#c084fc";}
    if(date){
      const d=new Date(date+"T12:00:00"); d.setHours(0,0,0,0);
      if(d>=today) items.push({date,time,label,icon,color,guestId:req.guestId,note:req.note||""});
    }
  });
  return items.sort((a,b)=>{ const c=a.date.localeCompare(b.date); return c!==0?c:a.time.localeCompare(b.time); });
}

function renderAgenda(){
  const main=document.getElementById("main"); if(!main)return;
  const items=getAgendaItems();
  if(items.length===0){main.innerHTML=`<div class="empty">Sin actividades programadas próximas</div>`;return;}
  const groups={};
  items.forEach(i=>{if(!groups[i.date])groups[i.date]=[];groups[i.date].push(i);});
  let h="";
  Object.keys(groups).sort().forEach(date=>{
    const di=groups[date];
    const d=new Date(date+"T12:00:00");
    const today=new Date();today.setHours(0,0,0,0);
    const diff=Math.round((d-today)/86400000);
    const lbl=diff===0?"Hoy ·":diff===1?"Mañana ·":"";
    h+=`<div class="day-block">
      <div class="day-hdr"><span class="day-name">${lbl} ${fmtDateLabel(date)}</span><span class="day-count">${di.length} actividad${di.length!==1?"es":""}</span></div>`;
    di.forEach(item=>{
      const g=gById(item.guestId);
      h+=`<div class="agenda-item" onclick="openGuestDetail('${item.guestId}')">
        <div class="ag-dot" style="background:${item.color}"></div>
        <div class="ag-body">
          <div class="ag-type">${item.icon} ${item.label}</div>
          <div class="ag-guest">Hab. ${g?.room||"—"} · ${fmtName(g?.name||"")}</div>
          ${item.note?`<div class="ag-note">${item.note}</div>`:""}
        </div>
        <div class="ag-time">${item.time||"—"}</div>
      </div>`;
    });
    h+=`</div>`;
  });
  main.innerHTML=h;
}

// ═══ DINNERS ══════════════════════════════════════════════
function renderDinners(){
  const main=document.getElementById("main"); if(!main)return;
  const dl=dList();
  if(dl.length===0){main.innerHTML=`<div class="empty">Sin cenas registradas</div>`;return;}
  const groups={};
  dl.forEach(d=>{const k=d.date||"sin-fecha";if(!groups[k])groups[k]=[];groups[k].push(d);});
  let h="";
  Object.keys(groups).sort().reverse().forEach(date=>{
    h+=`<div class="sec-lbl">${date==="sin-fecha"?"Sin fecha":fmtDateLabel(date)}</div>`;
    groups[date].forEach(d=>{
      const g=gById(d.guestId);
      h+=`<div class="drow">
        <div class="dleft">
          <div class="droom">Hab. ${g?.room||"—"}</div>
          <div class="dname">${fmtName(g?.name||"")}</div>
          ${d.note?`<div class="dnote">${d.note}</div>`:""}
        </div>
        <div class="dright"><div class="drest">${d.restaurant}</div><div class="dtime">${d.time||""}</div></div>
        <button class="btn-del" onclick="delDinner('${d.id}')">🗑</button>
      </div>`;
    });
  });
  main.innerHTML=h;
}
window.delDinner = id=>{ remove(ref(db,`dinners/${id}`)); showToast("Eliminada","#374151"); };

// ═══ ALARMS ═══════════════════════════════════════════════
function scheduleAlarm(req){
  if(!("Notification" in window))return;
  if(Notification.permission==="default") Notification.requestPermission();
  const target=new Date(req.alarm_dt).getTime();
  const warn=target-15*60*1000;
  const now=Date.now();
  const g=gById(req.guestId);
  const msg=`🎉 Decoración Hab.${g?.room||""} – ${req.note||""}`;
  if(warn>now) setTimeout(()=>{ if(Notification.permission==="granted") new Notification("Butler",{body:msg}); showToast("⏰ "+msg,"#c084fc"); },warn-now);
  else if(target>now) setTimeout(()=>{ if(Notification.permission==="granted") new Notification("Butler",{body:msg}); showToast("⏰ "+msg,"#c084fc"); },target-now);
}

// ═══ MODAL / TOAST ════════════════════════════════════════
window.showModal = html=>{ document.getElementById("mroot").innerHTML=`<div class="overlay" onclick="overlayClick(event)"><div class="modal">${html}</div></div>`; };
window.closeModal= ()=>{ document.getElementById("mroot").innerHTML=""; };
window.overlayClick=e=>{ if(e.target.classList.contains("overlay"))closeModal(); };

let _tt=null;
window.showToast=(msg,bg="#16a34a")=>{
  clearTimeout(_tt);
  document.getElementById("troot").innerHTML=`<div class="toast" style="background:${bg}">${msg}</div>`;
  _tt=setTimeout(()=>document.getElementById("troot").innerHTML="",2500);
};
function showToast(m,b){window.showToast(m,b);}

// ═══ INIT ═════════════════════════════════════════════════
(async()=>{
  await seedIfEmpty();
  initListeners();
  if("Notification" in window && Notification.permission==="default") Notification.requestPermission();
})();
} // end initApp

// Signal that Firebase module is ready
window._startApp = initApp;
_appReady = true;
if (_authPending) {
  initApp();
}

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Butler">
<meta name="theme-color" content="#08080f">
<title>Butler Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080f;--bg2:#111119;--bg3:#1a1a26;--border:#ffffff10;--border2:#ffffff1a;--text:#f0ede8;--text2:#8a8898;--text3:#4a4a5e;--gold:#c9a84c;--gold2:#e8c97a;--green:#4ade80;--yellow:#facc15;--orange:#fb923c;--red:#f87171;--blue:#818cf8;--pink:#e879a0;--teal:#2dd4bf;--purple:#c084fc}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'DM Mono',monospace;background:var(--bg);color:var(--text)}
body{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available}

#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;height:-webkit-fill-available;padding:32px;background:linear-gradient(180deg,#0d0d18,var(--bg))}
.login-title{font-family:'DM Serif Display',serif;font-size:32px;color:var(--gold2);margin-bottom:4px}
.login-sub{font-size:10px;color:var(--text3);letter-spacing:2px;margin-bottom:40px;text-transform:uppercase}
.login-box{width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px}
.login-input{width:100%;background:#111119;border:1px solid #ffffff18;border-radius:10px;padding:14px 16px;color:var(--text);font-size:16px;font-family:inherit;outline:none;text-align:center;letter-spacing:4px}
.login-btn{width:100%;background:linear-gradient(135deg,var(--gold),#b8892a);color:#08080f;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:1px}
.login-err{text-align:center;font-size:11px;color:var(--red);min-height:16px}

#app-root{display:none;flex-direction:column;height:100vh;height:-webkit-fill-available}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pulse{animation:pulse 1.5s infinite;font-size:40px}

.hdr{padding:50px 16px 10px;background:linear-gradient(180deg,#0d0d18,var(--bg));border-bottom:1px solid var(--border);flex-shrink:0}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start}
.hdr-title{font-family:'DM Serif Display',serif;font-size:24px;color:var(--gold2)}
.hdr-date{font-size:9px;color:var(--text3);margin-top:3px;letter-spacing:1.5px;text-transform:uppercase}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.active-pill{background:#ef444420;color:var(--red);font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid #ef444430}
.sync-ok{font-size:9px;color:var(--teal)}

.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:11px 10px;background:transparent;border:none;color:var(--text3);font-size:11px;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:4px}
.tab.on{color:var(--text);border-bottom-color:var(--gold)}
.tbg{background:var(--bg3);color:var(--text3);font-size:9px;padding:1px 5px;border-radius:9px}
.tab.on .tbg{background:#c9a84c20;color:var(--gold)}

.main{flex:1;overflow-y:auto;padding:13px 13px 90px;-webkit-overflow-scrolling:touch}
.col{display:flex;flex-direction:column;gap:9px}
.slbl{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.empty{text-align:center;color:var(--text3);padding:32px;font-size:12px}
.addbtn{width:100%;background:var(--bg3);border:1px dashed var(--border2);border-radius:10px;padding:10px;color:var(--gold);font-size:12px;cursor:pointer;font-family:inherit;margin-bottom:8px}

.chipwrap{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:11px;margin-bottom:8px}
.chipgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.chip{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:7px 3px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit}
.chip:active{background:#818cf820}
.chip-r{font-size:11px;font-weight:500;color:var(--blue)}
.chip-n{font-size:8px;color:var(--text2)}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:12px 13px;margin-bottom:7px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.card-left{display:flex;align-items:center;gap:9px}
.ricon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.rtype{font-size:12px;font-weight:500}
.rguest{font-size:10px;color:var(--text2);margin-top:1px}
.rtimer{font-size:21px;font-weight:500;font-family:'DM Serif Display',serif;text-align:right;line-height:1}
.tbar{height:3px;border-radius:2px;margin-top:4px;width:50px;background:#ffffff08;overflow:hidden}
.tfill{height:100%;border-radius:2px}
.rnote{font-size:11px;color:var(--text2);background:var(--bg);padding:6px 8px;border-radius:6px;margin:5px 0;line-height:1.4}
.racts{display:flex;align-items:center;gap:5px;margin-top:4px}
.rtime{font-size:10px;color:var(--text3);flex:1}
.bres{background:#16a34a20;color:var(--green);font-size:11px;padding:5px 11px;border-radius:6px;border:1px solid #16a34a30;cursor:pointer;font-family:inherit;font-weight:500}
.bdel{background:transparent;border:none;cursor:pointer;font-size:13px;color:var(--text3);padding:3px}
.resolved{opacity:.4}

.grow{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 11px;display:flex;align-items:center;gap:7px;margin-bottom:6px}
.ginfo{flex:1;cursor:pointer}
.groom{font-size:10px;color:var(--blue);font-weight:500}
.gname{font-size:12px;margin-top:1px}
.gmeta{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap}
.gtag{font-size:9px;color:var(--red)}
.gacts{display:flex;gap:1px}
.ibtn{background:transparent;border:none;cursor:pointer;font-size:15px;padding:4px;color:var(--text2)}

.drow{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.dleft{flex:1}
.droom{font-size:9px;color:var(--text3)}
.dname{font-size:12px}
.dnote{font-size:10px;color:var(--text2);margin-top:2px}
.dright{text-align:right}
.drest{font-size:12px;color:var(--pink);font-weight:500}
.dtime{font-size:9px;color:var(--text3);margin-top:2px}

.dayblk{background:var(--bg2);border:1px solid var(--border);border-radius:11px;margin-bottom:10px;overflow:hidden}
.dayhdr{padding:9px 13px;background:var(--bg3);display:flex;justify-content:space-between;align-items:center}
.dayname{font-size:12px;font-weight:500;color:var(--gold2)}
.agitem{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:9px;cursor:pointer}
.agitem:last-child{border-bottom:none}
.agtime{font-size:11px;color:var(--gold);min-width:42px;font-weight:500}
.agbody{flex:1}
.agtype{font-size:11px;font-weight:500}
.agguest{font-size:10px;color:var(--text2);margin-top:1px}
.agdot{width:8px;height:8px;border-radius:50%;margin-top:3px;flex-shrink:0}

.overlay{position:fixed;inset:0;background:#00000088;display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(3px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-top-left-radius:20px;border-top-right-radius:20px;width:100%;max-width:600px;padding:18px 17px 38px;max-height:90vh;overflow-y:auto}
.mhandle{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.mtitle{font-family:'DM Serif Display',serif;font-size:19px;color:var(--gold2);margin-bottom:3px}
.msub{font-size:10px;color:var(--blue);margin-bottom:14px}
.mlbl{font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin:11px 0 4px}
.minput{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:9px 11px;color:var(--text);font-size:12px;font-family:inherit;outline:none}
.minput:focus{border-color:var(--gold)}
.mta{resize:vertical;min-height:65px}
.msel{appearance:none;-webkit-appearance:none;cursor:pointer}
.typegrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin:3px 0}
.tbtn{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:8px 3px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;color:var(--text2);font-size:9px}
.tbtn.sel{color:var(--gold);border-color:var(--gold);background:#c9a84c10}
.ticon{font-size:18px}
.mbtns{display:flex;gap:7px;margin-top:16px;justify-content:flex-end}
.mpri{background:linear-gradient(135deg,var(--gold),#b8892a);color:#08080f;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500}
.msec{background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;font-family:inherit;font-size:12px}
.bdanger{background:#ef444420;color:var(--red);border:1px solid #ef444430;border-radius:8px;padding:10px 16px;cursor:pointer;font-family:inherit;font-size:12px;flex:1}
.notebox{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:11px;color:var(--text2);line-height:1.5;margin:5px 0}
.hrow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);gap:8px}
.htype{font-size:11px}
.hmeta{font-size:9px;color:var(--text3);margin-top:2px}
.httime{font-size:10px;color:var(--text3);text-align:right;flex-shrink:0}
.alrmtag{font-size:9px;color:var(--purple);background:#c084fc18;border:1px solid #c084fc30;padding:1px 6px;border-radius:10px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pill{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600}
.sbadge{font-size:9px;padding:3px 8px;border-radius:20px;font-weight:600}

.tlwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:12px}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);color:#fff;font-size:11px;padding:8px 18px;border-radius:22px;z-index:200;font-weight:500;box-shadow:0 4px 18px #00000066;white-space:nowrap}
</style>
</head>

const RTS=[{id:"maintenance",label:"Mantenimiento",icon:"🔧",color:"#fb923c",timer:true},{id:"reception",label:"Recepción",icon:"🏨",color:"#818cf8",timer:false},{id:"housekeeping",label:"Ama de Llaves",icon:"🧹",color:"#38bdf8",timer:false},{id:"roomservice",label:"Room Service",icon:"🍽️",color:"#c9a84c",timer:true},{id:"laundry",label:"Lavandería",icon:"👕",color:"#2dd4bf",timer:false},{id:"golfcart",label:"Golf Cart",icon:"⛳",color:"#4ade80",timer:false},{id:"boat",label:"Barco",icon:"⛵",color:"#60a5fa",timer:false},{id:"dinner",label:"Cena",icon:"🕯️",color:"#e879a0",timer:false},{id:"decoration",label:"Decoración",icon:"🎉",color:"#c084fc",timer:false},{id:"followup",label:"Seguimiento",icon:"📌",color:"#fbbf24",timer:false},{id:"other",label:"Otro",icon:"📋",color:"#94a3b8",timer:false}];
const RESTS=["Wildfire","Unik","Spezia","La Vista","Sake","Tepanyaky"];
const BOUT=["07:00","09:00","11:00","13:00","15:00","17:00","19:00"];
const BIN=["08:00","10:00","12:00","14:00","16:00","18:00","20:00"];
const DAYS=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MONTHS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const MSHORT=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const GTYPES=["","NOR","VP1","VP2","VP3","EPV","UVD","CUM","ANI","LUN","EXP"];
const CELS=["","Luna de Miel 🌙","Cumpleaños 🎂","Aniversario 💍","Baby Moon 🍼","Otro 🎊"];

let G={}, R={}, D={};
let tab="requests", tloop=null, _gid="", _rtype="";

const fn  = n=>{ if(!n)return""; let p=n.split(",").map(s=>s.trim()); return p.length===2?p[1]+" "+p[0]:n; };
const fst = n=>fn(n).split(" ")[0];
const gby = id=>G[id];
const rt  = id=>RTS.find(t=>t.id===id)||RTS[RTS.length-1];
const gl  = ()=>Object.values(G).sort((a,b)=>a.room.localeCompare(b.room));
const rl  = ()=>Object.values(R).sort((a,b)=>b.createdAt-a.createdAt);
const dl  = ()=>Object.values(D).sort((a,b)=>(b.date||"").localeCompare(a.date||""));

function el(ms){ let s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60); return h>0?h+"h "+m%60+"m":m>0?m+"m":s+"s"; }
function tc(ms){ let m=ms/60000; return m<15?"#4ade80":m<30?"#facc15":m<60?"#fb923c":"#f87171"; }
function ck(ts){ return new Date(ts).toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"}); }
function ff(ts){ return new Date(ts).toLocaleDateString("es-MX",{weekday:"short",day:"2-digit",month:"short"})+" "+ck(ts); }
function fdl(ds){ if(!ds)return""; let d=new Date(ds+"T12:00:00"); return DAYS[d.getDay()].slice(0,3)+" "+d.getDate()+" "+MSHORT[d.getMonth()]; }

async function seedIfEmpty(){
  return new Promise(res=>onValue(ref(db,"guests"),snap=>{ if(!snap.val()){ let b={}; SEED.forEach(g=>{ let k=push(ref(db,"guests")).key; b[k]={...g,id:k,note:"",boat_in:"",boat_out:"",checkin:"",checkout:"",gtype:"",celebration:"",allergy:"",agency:""}; }); set(ref(db,"guests"),b); } res(); },{onlyOnce:true}));
}

function initListeners(){
  onValue(ref(db,"guests"), s=>{ G=s.val()||{}; render(); });
  onValue(ref(db,"requests"),s=>{ R=s.val()||{}; render(); });
  onValue(ref(db,"dinners"), s=>{ D=s.val()||{}; render(); });
}

// ── RENDER ───────────────────────────────────────────────
function render(){
  let ar=document.getElementById("app-root");
  if(!ar||ar.style.display==="none") return;
  let ld=document.getElementById("loading");
  if(ld) buildShell();
  updateHeader();
  clearInterval(tloop);
  if(tab==="requests"){ renderReqs(); tloop=setInterval(renderReqs,1000); }
  else if(tab==="guests") renderGuests();
  else if(tab==="agenda") renderAgenda();
  else if(tab==="timeline") renderTimeline();
  else renderDinners();
}

function buildShell(){
  document.getElementById("app-root").innerHTML=`
  <div class="hdr"><div class="hdr-row">
    <div><div class="hdr-title">Butler</div><div class="hdr-date" id="hdate"></div></div>
    <div class="hdr-right"><div id="apill"></div><div class="sync-ok">● en línea</div></div>
  </div></div>
  <div class="tabs">
    <button class="tab on" onclick="goTab('requests')" id="t-requests">Solicitudes <span class="tbg" id="b-requests"></span></button>
    <button class="tab" onclick="goTab('timeline')" id="t-timeline">Timeline</button>
    <button class="tab" onclick="goTab('guests')" id="t-guests">Huéspedes <span class="tbg" id="b-guests"></span></button>
    <button class="tab" onclick="goTab('agenda')" id="t-agenda">Agenda <span class="tbg" id="b-agenda"></span></button>
    <button class="tab" onclick="goTab('dinners')" id="t-dinners">Cenas <span class="tbg" id="b-dinners"></span></button>
  </div>
  <div class="main" id="main"></div>`;
}

function updateHeader(){
  let d=new Date();
  let hd=document.getElementById("hdate"); if(hd) hd.textContent=DAYS[d.getDay()]+" "+d.getDate()+" de "+MONTHS[d.getMonth()];
  let act=rl().filter(r=>!r.resolvedAt).length;
  let ap=document.getElementById("apill"); if(ap) ap.innerHTML=act>0?`<div class="active-pill">${act} activa${act!==1?"s":""}</div>`:"";
  let br=document.getElementById("b-requests"); if(br) br.textContent=act||"";
  let bg=document.getElementById("b-guests"); if(bg) bg.textContent=Object.keys(G).length||"";
  let ba=document.getElementById("b-agenda"); if(ba) ba.textContent=agItems().length||"";
  let bd=document.getElementById("b-dinners"); if(bd) bd.textContent=Object.keys(D).length||"";
}

window.goTab=function(t){
  tab=t;
  document.querySelectorAll(".tab").forEach(el=>el.classList.remove("on"));
  let te=document.getElementById("t-"+t); if(te) te.classList.add("on");
  render();
};

// ── REQUESTS ─────────────────────────────────────────────
function renderReqs(){
  let m=document.getElementById("main"); if(!m)return;
  let sorted=gl();
  let active=rl().filter(r=>!r.resolvedAt);
  let today=new Date().toDateString();
  let resolved=rl().filter(r=>r.resolvedAt&&new Date(r.resolvedAt).toDateString()===today);
  let h=`<div class="chipwrap"><div class="slbl">Nueva solicitud · elige huésped</div><div class="chipgrid">`;
  sorted.forEach(g=>{ h+=`<button class="chip" onclick="openReq('${g.id}')"><span class="chip-r">${g.room}</span><span class="chip-n">${fst(g.name)}</span></button>`; });
  h+=`</div></div>`;
  if(!active.length) h+=`<div class="empty">Sin solicitudes activas ✓</div>`;
  else { h+=`<div class="slbl">Activas (${active.length})</div>`; active.forEach(r=>{ h+=rcHTML(r,false); }); }
  if(resolved.length){ h+=`<div class="slbl" style="margin-top:14px">Resueltas hoy (${resolved.length})</div>`; resolved.forEach(r=>{ h+=rcHTML(r,true); }); }
  m.innerHTML=h;
}

function rcHTML(req,res){
  let t=rt(req.type), g=gby(req.guestId);
  let el2=Date.now()-req.createdAt, dur=req.resolvedAt?req.resolvedAt-req.createdAt:el2;
  let col=res?"#3a3a4a":tc(el2), pct=Math.min(100,(dur/3600000)*100);
  let showT=t.timer&&!res, showTR=t.timer&&res;
  let ex="";
  if(req.note) ex+=`<div class="rnote">${req.note}</div>`;
  if(req.restaurant) ex+=`<div class="rnote">🕯️ ${req.restaurant} ${req.dinner_time||""} ${req.dinner_date?fdl(req.dinner_date):""}</div>`;
  if(req.boat_type) ex+=`<div class="rnote">⛵ ${req.boat_type==="out"?"Salida":"Llegada"} ${req.boat_time||""} ${req.boat_date?fdl(req.boat_date):""}</div>`;
  if(req.golf_date) ex+=`<div class="rnote">⛳ ${fdl(req.golf_date)} ${req.golf_time||""}</div>`;
  if(req.alarm_dt) ex+=`<div class="rnote"><span class="alrmtag">⏰ ${new Date(req.alarm_dt).toLocaleDateString("es-MX",{day:"2-digit",month:"short"})} ${req.alarm_time||""}</span></div>`;
  if(req.other_type) ex+=`<div class="rnote">📋 ${req.other_type}</div>`;
  let timer=showT?`<div><div class="rtimer" style="color:${col}">${el(dur)}</div><div class="tbar"><div class="tfill" style="background:${col};width:${pct}%"></div></div></div>`
    :showTR?`<div style="font-size:11px;color:var(--text3)">⏱ ${el(dur)}</div>`:"";
  return `<div class="card ${res?"resolved":""}">
    <div class="card-top"><div class="card-left"><div class="ricon" style="background:${t.color}18;color:${t.color}">${t.icon}</div>
    <div><div class="rtype">${t.label}</div>${g?`<div class="rguest">Hab. ${g.room} · ${fst(g.name)}</div>`:""}</div></div>${timer}</div>
    ${ex}<div class="racts"><span class="rtime">${ck(req.createdAt)}</span>
    ${!res?`<button class="bres" onclick="resolveR('${req.id}')">✓ Resolver</button>`:""}
    <button class="bdel" onclick="delR('${req.id}')">🗑</button></div></div>`;
}

window.resolveR=function(id){ update(ref(db,"requests/"+id),{resolvedAt:Date.now()}); toast("Resuelta ✓"); };
window.delR=function(id){ remove(ref(db,"requests/"+id)); toast("Eliminada","#374151"); };

// ── NEW REQUEST ───────────────────────────────────────────
window.openReq=function(gid){
  _gid=gid; _rtype="";
  let g=gby(gid);
  let btns=RTS.map(t=>`<button class="tbtn" id="tb_${t.id}" onclick="selT('${t.id}')"><span class="ticon">${t.icon}</span>${t.label}</button>`).join("");
  showM(`<div class="mhandle"></div><div class="mtitle">Nueva solicitud</div><div class="msub">Hab. ${g.room} · ${fn(g.name)}</div>
    <div class="mlbl">Tipo</div><div class="typegrid">${btns}</div>
    <div id="xf"></div>
    <div class="mlbl">Nota</div><textarea class="minput mta" id="rnote" placeholder="Descripción..."></textarea>
    <div class="mbtns"><button class="msec" onclick="closeM()">Cancelar</button><button class="mpri" onclick="subReq()">Crear</button></div>`);
};

window.selT=function(tid){
  _rtype=tid;
  document.querySelectorAll(".tbtn").forEach(b=>b.classList.remove("sel"));
  let e=document.getElementById("tb_"+tid); if(e) e.classList.add("sel");
  let xf=document.getElementById("xf");
  if(tid==="dinner") xf.innerHTML=`<div class="mlbl">Restaurante</div><select class="minput msel" id="xrest"><option value="">Seleccionar...</option>${RESTS.map(r=>`<option>${r}</option>`).join("")}</select><div class="mlbl">Fecha</div><input type="date" class="minput" id="xddate"><div class="mlbl">Hora</div><input type="text" class="minput" id="xdtime" placeholder="20:00">`;
  else if(tid==="boat") xf.innerHTML=`<div class="mlbl">Tipo</div><select class="minput msel" id="xbt" onchange="updBT()"><option value="out">Salida (7am–7pm c/2h)</option><option value="in">Llegada (8am–8pm c/2h)</option></select><div class="mlbl">Horario</div><select class="minput msel" id="xbtime"><option value="">Seleccionar...</option>${BOUT.map(t=>`<option>${t}</option>`).join("")}</select><div class="mlbl">Fecha</div><input type="date" class="minput" id="xbdate">`;
  else if(tid==="golfcart") xf.innerHTML=`<div class="mlbl">Fecha entrega</div><input type="date" class="minput" id="xgdate"><div class="mlbl">Hora</div><input type="text" class="minput" id="xgtime" placeholder="09:00">`;
  else if(tid==="decoration") xf.innerHTML=`<div class="mlbl">Fecha</div><input type="date" class="minput" id="xdecdate"><div class="mlbl">Hora</div><input type="text" class="minput" id="xdectime" placeholder="18:00"><div class="mlbl">⏰ Alarma</div><div class="row2"><input type="date" class="minput" id="xalmdate"><input type="text" class="minput" id="xalmtime" placeholder="17:00"></div>`;
  else if(tid==="other") xf.innerHTML=`<div class="mlbl">¿De qué trata?</div><input type="text" class="minput" id="xother" placeholder="Describe la solicitud...">`;
  else xf.innerHTML="";
};

window.updBT=function(){ let sel=document.getElementById("xbt"),t=document.getElementById("xbtime"); if(!sel||!t)return; let list=sel.value==="in"?BIN:BOUT; t.innerHTML=`<option value="">Seleccionar...</option>`+list.map(x=>`<option>${x}</option>`).join(""); };

window.subReq=function(){
  if(!_rtype){ toast("Elige un tipo","#dc2626"); return; }
  let note=document.getElementById("rnote")?.value||"";
  let req={guestId:_gid,type:_rtype,note,createdAt:Date.now(),resolvedAt:null};
  if(_rtype==="dinner"){ req.restaurant=document.getElementById("xrest")?.value||""; req.dinner_date=document.getElementById("xddate")?.value||""; req.dinner_time=document.getElementById("xdtime")?.value||""; if(req.restaurant){ let dk=push(ref(db,"dinners")).key; set(ref(db,"dinners/"+dk),{id:dk,guestId:_gid,restaurant:req.restaurant,note,date:req.dinner_date,time:req.dinner_time,createdAt:Date.now()}); } }
  if(_rtype==="boat"){ req.boat_type=document.getElementById("xbt")?.value||"out"; req.boat_time=document.getElementById("xbtime")?.value||""; req.boat_date=document.getElementById("xbdate")?.value||""; }
  if(_rtype==="golfcart"){ req.golf_date=document.getElementById("xgdate")?.value||""; req.golf_time=document.getElementById("xgtime")?.value||""; }
  if(_rtype==="decoration"){ req.dec_date=document.getElementById("xdecdate")?.value||""; req.dec_time=document.getElementById("xdectime")?.value||""; let ad=document.getElementById("xalmdate")?.value||"",at=document.getElementById("xalmtime")?.value||""; if(ad&&at){ req.alarm_dt=ad+"T"+at; req.alarm_time=at; schedAlarm(req); } }
  if(_rtype==="other") req.other_type=document.getElementById("xother")?.value||"";
  let k=push(ref(db,"requests")).key; req.id=k; set(ref(db,"requests/"+k),req);
  closeM(); toast("Solicitud creada ✓");
};

// ── GUESTS ────────────────────────────────────────────────
function renderGuests(){
  let m=document.getElementById("main"); if(!m)return;
  let h=`<button class="addbtn" onclick="openAddG()">+ Agregar huésped</button>`;
  gl().forEach(g=>{
    let pend=rl().filter(r=>r.guestId===g.id&&!r.resolvedAt).length;
    h+=`<div class="grow"><div class="ginfo" onclick="openGD('${g.id}')">
      <div class="groom">${g.room}</div><div class="gname">${fn(g.name)}</div>
      <div class="gmeta">${pend>0?`<span class="gtag">● ${pend} pend.</span>`:""}${g.note?`<span>📝</span>`:""}${g.boat_out?`<span style="font-size:9px;color:var(--teal)">⛵↑${g.boat_out}</span>`:""}${g.celebration?`<span style="font-size:9px;color:var(--purple)">${g.celebration}</span>`:""}${g.allergy?`<span style="font-size:9px;color:var(--orange)">⚠️${g.allergy}</span>`:""}</div>
    </div><div class="gacts">
      <button class="ibtn" onclick="openNote('${g.id}')">📝</button>
      <button class="ibtn" onclick="openBoat('${g.id}')">⛵</button>
      <button class="ibtn" onclick="openEditG('${g.id}')">✏️</button>
      <button class="ibtn" style="color:var(--red)" onclick="confDel('${g.id}')">🗑</button>
    </div></div>`;
  });
  m.innerHTML=h;
}

function gForm(g){
  let v=k=>g&&g[k]?g[k]:"";
  let selC=CELS.map(t=>`<option ${v("celebration")===t?"selected":""}>${t}</option>`).join("");
  let selT=GTYPES.map(t=>`<option ${v("gtype")===t?"selected":""}>${t}</option>`).join("");
  return `<div class="mlbl">Habitación *</div><input class="minput" id="groot" inputmode="numeric" placeholder="1234" value="${v("room")}">
    <div class="mlbl">Nombre (APELLIDO, NOMBRE) *</div><input class="minput" id="gnoot" placeholder="SMITH, JOHN" style="text-transform:uppercase" value="${v("name")}">
    <div class="row2"><div><div class="mlbl">Check-in</div><input type="date" class="minput" id="gcin" value="${v("checkin")}"></div>
    <div><div class="mlbl">Check-out</div><input type="date" class="minput" id="gcout" value="${v("checkout")}"></div></div>
    <div class="mlbl">Tipo</div><select class="minput msel" id="gtype"><option value="">Sin tipo</option>${selT}</select>
    <div class="mlbl">Celebración</div><select class="minput msel" id="gcel"><option value="">Ninguna</option>${selC}</select>
    <div class="mlbl">Alergia</div><input class="minput" id="gallg" placeholder="Ej: mariscos..." value="${v("allergy")}">
    <div class="mlbl">Agencia</div><input class="minput" id="gagcy" placeholder="Ej: AMEX..." value="${v("agency")}">`;
}

window.openAddG=function(){ showM(`<div class="mhandle"></div><div class="mtitle">Agregar huésped</div>${gForm(null)}<div class="mbtns"><button class="msec" onclick="closeM()">Cancelar</button><button class="mpri" onclick="saveG(null)">Agregar</button></div>`); };
window.openEditG=function(gid){ let g=gby(gid); showM(`<div class="mhandle"></div><div class="mtitle">Editar huésped</div>${gForm(g)}<div class="mbtns"><button class="msec" onclick="closeM()">Cancelar</button><button class="mpri" onclick="saveG('${gid}')">Guardar</button></div>`); };

window.saveG=function(gid){
  let room=document.getElementById("groot")?.value?.trim();
  let name=document.getElementById("gnoot")?.value?.trim()?.toUpperCase();
  if(!room||!name){ toast("Completa los campos","#dc2626"); return; }
  let data={room,name,checkin:document.getElementById("gcin")?.value||"",checkout:document.getElementById("gcout")?.value||"",gtype:document.getElementById("gtype")?.value||"",celebration:document.getElementById("gcel")?.value||"",allergy:document.getElementById("gallg")?.value||"",agency:document.getElementById("gagcy")?.value||""};
  if(gid){ update(ref(db,"guests/"+gid),data); } else { let k=push(ref(db,"guests")).key; set(ref(db,"guests/"+k),{id:k,note:"",boat_in:"",boat_out:"",...data}); }
  closeM(); toast("Guardado ✓");
};

window.confDel=function(gid){ let g=gby(gid); showM(`<div class="mhandle"></div><div class="mtitle">Eliminar</div><div class="msub">Hab. ${g.room} · ${fn(g.name)}</div><p style="font-size:11px;color:var(--text2);margin-top:8px">Se eliminarán sus solicitudes y cenas.</p><div style="display:flex;gap:8px;margin-top:14px"><button class="msec" onclick="closeM()">Cancelar</button><button class="bdanger" onclick="delG('${gid}')">Eliminar</button></div>`); };
window.delG=function(gid){ remove(ref(db,"guests/"+gid)); rl().filter(r=>r.guestId===gid).forEach(r=>remove(ref(db,"requests/"+r.id))); dl().filter(d=>d.guestId===gid).forEach(d=>remove(ref(db,"dinners/"+d.id))); closeM(); toast("Eliminado","#374151"); };
window.openNote=function(gid){ let g=gby(gid); showM(`<div class="mhandle"></div><div class="mtitle">📝 Anotación</div><div class="msub">Hab. ${g.room} · ${fn(g.name)}</div><textarea class="minput mta" id="ntext" style="min-height:90px" placeholder="Preferencias, observaciones...">${g.note||""}</textarea><div class="mbtns"><button class="msec" onclick="closeM()">Cancelar</button><button class="mpri" onclick="saveNote('${gid}')">Guardar</button></div>`); };
window.saveNote=function(gid){ update(ref(db,"guests/"+gid),{note:document.getElementById("ntext")?.value||""}); closeM(); toast("Guardado ✓"); };
window.openBoat=function(gid){ let g=gby(gid); let oo=BOUT.map(t=>`<option ${g.boat_out===t?"selected":""}>${t}</option>`).join(""); let ii=BIN.map(t=>`<option ${g.boat_in===t?"selected":""}>${t}</option>`).join(""); showM(`<div class="mhandle"></div><div class="mtitle">⛵ Barco</div><div class="msub">Hab. ${g.room} · ${fn(g.name)}</div><div class="mlbl">Salida (7am–7pm c/2h)</div><select class="minput msel" id="bout"><option value="">Sin asignar</option>${oo}</select><div class="mlbl">Llegada (8am–8pm c/2h)</div><select class="minput msel" id="binn"><option value="">Sin asignar</option>${ii}</select><div class="mbtns"><button class="msec" onclick="closeM()">Cancelar</button><button class="mpri" onclick="saveBoat('${gid}')">Guardar</button></div>`); };
window.saveBoat=function(gid){ update(ref(db,"guests/"+gid),{boat_out:document.getElementById("bout")?.value||"",boat_in:document.getElementById("binn")?.value||""}); closeM(); toast("Guardado ✓"); };

window.openGD=function(gid){
  let g=gby(gid); if(!g)return;
  let gR=rl().filter(r=>r.guestId===gid);
  let active=gR.filter(r=>!r.resolvedAt);
  let hist=gR.filter(r=>r.resolvedAt).slice(0,10);
  let gD=dl().filter(d=>d.guestId===gid);
  let tags=[g.checkin?`📅 In: ${fdl(g.checkin)}`:"",g.checkout?`📅 Out: ${fdl(g.checkout)}`:"",g.gtype?`🏷 ${g.gtype}`:"",g.celebration||"",g.allergy?`⚠️ ${g.allergy}`:"",g.agency?`🏢 ${g.agency}`:""].filter(Boolean);
  let h=`<div class="mhandle"></div><div class="mtitle">Hab. ${g.room}</div><div class="msub">${fn(g.name)}</div>`;
  if(tags.length) h+=`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">${tags.map(t=>`<span style="font-size:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:3px 8px;color:var(--text2)">${t}</span>`).join("")}</div>`;
  if(g.note) h+=`<div class="notebox">${g.note}</div>`;
  if(g.boat_out||g.boat_in) h+=`<div class="mlbl">⛵ Barco</div>${g.boat_out?`<div class="notebox">↑ Salida: ${g.boat_out}</div>`:""}${g.boat_in?`<div class="notebox">↓ Llegada: ${g.boat_in}</div>`:""}`;
  if(active.length){ h+=`<div class="mlbl">Solicitudes activas</div>`; active.forEach(r=>h+=rcHTML(r,false)); }
  if(gD.length){ h+=`<div class="mlbl">Cenas</div>`; gD.forEach(d=>h+=`<div class="hrow"><div><div class="htype">🕯️ ${d.restaurant}</div><div class="hmeta">${d.date?fdl(d.date):""} ${d.time||""}</div>${d.note?`<div class="hmeta">${d.note}</div>`:""}</div><div class="httime">${ck(d.createdAt)}</div></div>`); }
  let gGolf=gR.filter(r=>r.type==="golfcart"); if(gGolf.length){ h+=`<div class="mlbl">⛳ Golf Cart</div>`; gGolf.forEach(r=>h+=`<div class="notebox">${r.golf_date?fdl(r.golf_date):""} ${r.golf_time||""} ${r.note?`<br>${r.note}`:""}</div>`); }
  let gDec=gR.filter(r=>r.type==="decoration"); if(gDec.length){ h+=`<div class="mlbl">🎉 Decoraciones</div>`; gDec.forEach(r=>h+=`<div class="notebox">${r.dec_date?fdl(r.dec_date):""} ${r.dec_time||""} ${r.alarm_dt?`<br><span class="alrmtag">⏰ ${new Date(r.alarm_dt).toLocaleDateString("es-MX",{day:"2-digit",month:"short"})} ${r.alarm_time}</span>`:""} ${r.note?`<br>${r.note}`:""}</div>`); }
  let gFU=gR.filter(r=>r.type==="followup"); if(gFU.length){ h+=`<div class="mlbl">📌 Seguimientos</div>`; gFU.forEach(r=>h+=`<div class="notebox">${r.note||"—"}<br><span style="font-size:9px;color:var(--text3)">${ff(r.createdAt)}</span></div>`); }
  if(hist.length){ h+=`<div class="mlbl">Historial</div>`; hist.forEach(r=>{ let t2=rt(r.type),dur=r.resolvedAt-r.createdAt; h+=`<div class="hrow"><div><div class="htype">${t2.icon} ${t2.label}</div><div class="hmeta">${ff(r.createdAt)} ${r.note?`· ${r.note}`:""}</div>${t2.timer?`<div class="hmeta" style="color:var(--teal)">⏱ ${el(dur)}</div>`:""}</div><div class="httime">${ck(r.resolvedAt)}</div></div>`; }); }
  h+=`<div class="mbtns"><button class="msec" onclick="closeM()">Cerrar</button><button class="mpri" onclick="closeM();openReq('${gid}')">➕ Solicitud</button></div>`;
  showM(h);
};

// ── AGENDA ────────────────────────────────────────────────
function agItems(){
  let items=[], today=new Date(); today.setHours(0,0,0,0);
  rl().forEach(req=>{
    let date=null,time="",label="",icon="",color="";
    if(req.type==="dinner"&&req.dinner_date){date=req.dinner_date;time=req.dinner_time||"";label="Cena · "+(req.restaurant||"");icon="🕯️";color="#e879a0";}
    if(req.type==="golfcart"&&req.golf_date){date=req.golf_date;time=req.golf_time||"";label="Golf Cart";icon="⛳";color="#4ade80";}
    if(req.type==="boat"&&req.boat_date){date=req.boat_date;time=req.boat_time||"";label="Barco "+(req.boat_type==="out"?"↑ Salida":"↓ Llegada");icon="⛵";color="#60a5fa";}
    if(req.type==="decoration"&&req.dec_date){date=req.dec_date;time=req.dec_time||"";label="Decoración";icon="🎉";color="#c084fc";}
    if(date){ let d=new Date(date+"T12:00:00"); d.setHours(0,0,0,0); if(d>=today) items.push({date,time,label,icon,color,guestId:req.guestId,note:req.note||""}); }
  });
  return items.sort((a,b)=>{ let c=a.date.localeCompare(b.date); return c?c:a.time.localeCompare(b.time); });
}

function renderAgenda(){
  let m=document.getElementById("main"); if(!m)return;
  let items=agItems();
  if(!items.length){ m.innerHTML=`<div class="empty">Sin actividades próximas</div>`; return; }
  let groups={}; items.forEach(i=>{ if(!groups[i.date])groups[i.date]=[]; groups[i.date].push(i); });
  let h=""; let today=new Date(); today.setHours(0,0,0,0);
  Object.keys(groups).sort().forEach(date=>{
    let di=groups[date], d=new Date(date+"T12:00:00"); d.setHours(0,0,0,0);
    let diff=Math.round((d-today)/86400000);
    let lbl=diff===0?"Hoy":diff===1?"Mañana":fdl(date);
    h+=`<div class="dayblk"><div class="dayhdr"><span class="dayname">${lbl}</span><span style="font-size:10px;color:var(--text3)">${di.length} actividad${di.length!==1?"es":""}</span></div>`;
    di.forEach(item=>{ let g=gby(item.guestId); h+=`<div class="agitem" onclick="openGD('${item.guestId}')"><div class="agdot" style="background:${item.color}"></div><div class="agbody"><div class="agtype">${item.icon} ${item.label}</div><div class="agguest">Hab. ${g?.room||"—"} · ${fn(g?.name||"")}</div>${item.note?`<div style="font-size:10px;color:var(--text3)">${item.note}</div>`:""}</div><div class="agtime">${item.time||"—"}</div></div>`; });
    h+=`</div>`;
  });
  m.innerHTML=h;
}

// ── TIMELINE ─────────────────────────────────────────────
function renderTimeline(){
  let m=document.getElementById("main"); if(!m)return;
  let hasDates=gl().filter(g=>g.checkin&&g.checkout);
  let noDates=gl().filter(g=>!g.checkin||!g.checkout);
  if(!hasDates.length){ m.innerHTML=`<div class="empty">Sin huéspedes con fechas.<br>Edita los huéspedes y agrega check-in/out.</div>`; return; }
  let today=new Date(); today.setHours(0,0,0,0);
  let all=[...hasDates.flatMap(g=>[new Date(g.checkin+"T12:00:00"),new Date(g.checkout+"T12:00:00")])];
  let minD=new Date(Math.min(...all)); minD.setHours(0,0,0,0);
  let maxD=new Date(Math.max(...all)); maxD.setHours(0,0,0,0);
  let startD=new Date(Math.min(minD,new Date(today.getTime()-2*86400000))); startD.setHours(0,0,0,0);
  let dayCount=Math.max(Math.round((maxD-startD)/86400000)+3,14);
  const CELL=36,LEFT=88;
  let dayLabels=[];
  for(let i=0;i<dayCount;i++){
    let d=new Date(startD.getTime()+i*86400000);
    dayLabels.push({dd:d.getDate(),mo:MSHORT[d.getMonth()],dy:DAYS[d.getDay()].slice(0,3),isToday:d.toDateString()===today.toDateString()});
  }
  let h=`<div class="tlwrap"><div style="min-width:${LEFT+dayCount*CELL}px">`;
  h+=`<div style="display:flex;position:sticky;top:0;z-index:10;background:var(--bg)"><div style="width:${LEFT}px;flex-shrink:0;padding:4px 6px;font-size:9px;color:var(--text3);border-bottom:1px solid var(--border)">HAB</div>`;
  dayLabels.forEach(d=>{ h+=`<div style="width:${CELL}px;flex-shrink:0;text-align:center;padding:2px 0;border-bottom:1px solid var(--border);${d.isToday?"background:#c9a84c18":""}"><div style="font-size:7px;color:${d.isToday?"var(--gold)":"var(--text3)"}">${d.dy}</div><div style="font-size:10px;font-weight:${d.isToday?"700":"400"};color:${d.isToday?"var(--gold2)":"var(--text2)"}">${d.dd}</div><div style="font-size:7px;color:var(--text3)">${d.mo}</div></div>`; });
  h+=`</div>`;
  const TC={"VP1":"#c8c840","VP2":"#d4af37","VP3":"#ffd700","EPV":"#ffd700","CUM":"#e879a0","ANI":"#c084fc","LUN":"#60a5fa","UVD":"#4ade80","NOR":"#818cf8","EXP":"#94a3b8"};
  hasDates.sort((a,b)=>a.checkin.localeCompare(b.checkin)).forEach(g=>{
    let cin=new Date(g.checkin+"T12:00:00"); cin.setHours(0,0,0,0);
    let cout=new Date(g.checkout+"T12:00:00"); cout.setHours(0,0,0,0);
    let color=TC[g.gtype]||"#818cf8";
    let pend=rl().filter(r=>r.guestId===g.id&&!r.resolvedAt).length;
    let s=Math.max(0,Math.round((cin-startD)/86400000));
    let e=Math.min(dayCount-1,Math.round((cout-startD)/86400000));
    let bw=Math.max(1,(e-s+1))*CELL, bl=s*CELL;
    let dLeft=Math.round((cout-today)/86400000);
    let isOut=dLeft<0,isToday=dLeft===0;
    let tp=Math.round((today-startD)/86400000);
    h+=`<div style="display:flex;align-items:center;border-bottom:1px solid var(--border);min-height:38px;cursor:pointer" onclick="openGD('${g.id}')">
      <div style="width:${LEFT}px;flex-shrink:0;padding:4px 6px"><div style="font-size:10px;font-weight:600;color:var(--blue)">${g.room}</div><div style="font-size:8px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:${LEFT-8}px">${fst(g.name)}</div>${pend>0?`<div style="font-size:7px;color:var(--red)">●${pend}</div>`:""}</div>
      <div style="position:relative;flex:1;height:30px">
        <div style="position:absolute;left:${bl}px;width:${bw}px;height:24px;top:3px;background:${isOut?"#374151":color+"33"};border:1px solid ${isOut?"#4b5563":color};border-radius:6px;display:flex;align-items:center;padding:0 6px;overflow:hidden${isToday?";box-shadow:0 0 0 2px "+color:""}">
          <span style="font-size:9px;color:${isOut?"#6b7280":color};font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${isOut?"✓ OUT":isToday?"🔴 HOY":dLeft+"d"} ${g.gtype&&g.gtype!=="NOR"?" · "+g.gtype:""}${g.celebration?" · "+g.celebration.split(" ")[0]:""}</span>
        </div>
        ${tp>=0&&tp<dayCount?`<div style="position:absolute;left:${tp*CELL+CELL/2}px;top:0;width:1px;height:100%;background:var(--gold);opacity:.4"></div>`:""}
      </div></div>`;
  });
  h+=`</div></div>`;
  if(noDates.length){ h+=`<div class="slbl" style="margin-top:14px">Sin fechas (${noDates.length})</div>`; noDates.forEach(g=>{ h+=`<div class="grow" onclick="openEditG('${g.id}')"><div class="ginfo"><div class="groom">${g.room}</div><div class="gname">${fn(g.name)}</div><div style="font-size:9px;color:var(--orange)">⚠️ Sin check-in/out · toca para editar</div></div></div>`; }); }
  m.innerHTML=h;
}

// ── DINNERS ──────────────────────────────────────────────
function renderDinners(){
  let m=document.getElementById("main"); if(!m)return;
  let sorted=dl();
  if(!sorted.length){ m.innerHTML=`<div class="empty">Sin cenas registradas</div>`; return; }
  let groups={}; sorted.forEach(d=>{ let k=d.date||"sin-fecha"; if(!groups[k])groups[k]=[]; groups[k].push(d); });
  let h="";
  Object.keys(groups).sort().reverse().forEach(date=>{
    h+=`<div class="slbl">${date==="sin-fecha"?"Sin fecha":fdl(date)}</div>`;
    groups[date].forEach(d=>{ let g=gby(d.guestId); h+=`<div class="drow"><div class="dleft"><div class="droom">Hab. ${g?.room||"—"}</div><div class="dname">${fn(g?.name||"")}</div>${d.note?`<div class="dnote">${d.note}</div>`:""}</div><div class="dright"><div class="drest">${d.restaurant}</div><div class="dtime">${d.time||""}</div></div><button class="bdel" onclick="delDin('${d.id}')">🗑</button></div>`; });
  });
  m.innerHTML=h;
}
window.delDin=function(id){ remove(ref(db,"dinners/"+id)); toast("Eliminada","#374151"); };

// ── ALARM ─────────────────────────────────────────────────
function schedAlarm(req){
  if(!("Notification" in window))return;
  if(Notification.permission==="default") Notification.requestPermission();
  let target=new Date(req.alarm_dt).getTime(), warn=target-15*60*1000, now=Date.now();
  let g=gby(req.guestId), msg="🎉 Decoración Hab."+(g?.room||"")+" – "+(req.note||"");
  let when=warn>now?warn-now:target>now?target-now:null;
  if(when) setTimeout(()=>{ if(Notification.permission==="granted") new Notification("Butler",{body:msg}); toast("⏰ "+msg,"#c084fc"); },when);
}

// ── MODAL / TOAST ─────────────────────────────────────────
function showM(html){ document.getElementById("mroot").innerHTML=`<div class="overlay" onclick="if(event.target.classList.contains('overlay'))closeM()"><div class="modal">${html}</div></div>`; }
function closeM(){ document.getElementById("mroot").innerHTML=""; }
window.closeM=closeM; window.showM=showM;

let _tt=null;
function toast(msg,bg="#16a34a"){ clearTimeout(_tt); document.getElementById("troot").innerHTML=`<div class="toast" style="background:${bg}">${msg}</div>`; _tt=setTimeout(()=>document.getElementById("troot").innerHTML="",2500); }

// ── INIT ──────────────────────────────────────────────────
(async()=>{
  await seedIfEmpty();
  initListeners();
  if("Notification" in window && Notification.permission==="default") Notification.requestPermission();
})();

// Signal ready
appStarted = true;
window.startApp = function(){ render(); };
if(pendingStart){ render(); }

</script>
